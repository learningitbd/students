<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIT BD - Advanced Management System</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #34495e; --accent: #27ae60; --text: #2c3e50; --danger: #e74c3c; --info: #3498db; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 1300px; margin: auto; }
        
        #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--primary); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; width: 350px; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        
        .header { background: var(--primary); color: white; padding: 15px; text-align: center; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; padding: 10px 30px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 5px solid var(--accent); }
        .card h3 { margin: 0; color: #7f8c8d; font-size: 13px; text-transform: uppercase; }
        .card p { font-size: 22px; font-weight: bold; margin: 10px 0 0; color: var(--primary); }

        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; flex-wrap: wrap; }
        .search-box { flex-grow: 2; padding: 12px 20px; border: 2px solid var(--primary); border-radius: 25px; outline: none; font-size: 15px; }
        
        .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
        .tab-btn { background: #ddd; padding: 10px 18px; cursor: pointer; border-radius: 5px; border: none; font-weight: 600; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        .section { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 5px; width: 100%; box-sizing: border-box; }
        
        button { padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; border: none; }
        .btn-submit { background: var(--accent); color: white; }
        .btn-danger { background: var(--danger); color: white; }

        .table-container { background: white; border-radius: 8px; overflow-x: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: var(--secondary); color: white; }
        .clickable { color: var(--info); cursor: pointer; font-weight: bold; text-decoration: underline; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { background: white; margin: 5% auto; padding: 25px; border-radius: 12px; width: 85%; max-width: 850px; position: relative; max-height: 85vh; overflow-y: auto; }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2>Admin Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button class="btn-submit" style="width:100%" onclick="checkLogin()">Login</button>
        <p id="loginError" style="color:red; display:none; margin-top:10px;">Invalid Credentials!</p>
    </div>
</div>

<div class="container" id="mainContent" style="display:none;">
    <div class="header">
        <h1>Learning IT BD</h1>
        <button class="btn-danger" onclick="logout()">Logout</button>
    </div>

    <div class="dashboard">
        <div class="card"><h3>Total Students</h3><p id="totalStudents">0</p></div>
        <div class="card"><h3>Total Collection</h3><p id="totalCollection">৳ 0</p></div>
        <div class="card" style="border-left-color: var(--danger)"><h3>Total Due</h3><p id="totalDue" style="color:var(--danger)">৳ 0</p></div>
        <div class="card"><h3>Ref. Bonus</h3><p id="totalReferral">৳ 0</p></div>
    </div>

    <div class="controls">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(event, 'admission')">Admission</button>
            <button class="tab-btn" onclick="switchTab(event, 'studentList')">Student List</button>
            <button class="tab-btn" onclick="switchTab(event, 'referralList')">Referrals</button>
            <button class="tab-btn" onclick="switchTab(event, 'courseList')">Courses</button>
        </div>
        <input type="text" id="liveSearch" class="search-box" placeholder="Search by Name, Phone, ID or Receipt..." onkeyup="applySearch()">
    </div>

    <div id="admission" class="tab-content">
        <div class="section">
            <h3 id="formTitle">New Admission</h3>
            <div class="grid-form" id="admissionForm">
                <input type="text" id="stdName" placeholder="Full Name *">
                <input type="text" id="stdMobile" placeholder="Phone Number *">
                <select id="courseSelect" onchange="autoFee()">
                    <option value="">-- Select Course --</option>
                </select>
                <input type="number" id="totalFee" placeholder="Total Fee *">
                <input type="text" id="referrer" placeholder="Referrer Name">
                <input type="text" id="bookNo" placeholder="Book Number *">
                <input type="text" id="receiptNo" placeholder="Receipt Number *">
                <input type="number" id="payAmt" placeholder="Initial Pay (৳)">
                <input type="text" id="reciever" placeholder="Collected By">
                <button class="btn-submit" onclick="saveStudent()">Save Student</button>
            </div>
        </div>
    </div>

    <div id="studentList" class="tab-content" style="display:none;">
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>ID</th><th>Student Info</th><th>Course</th><th>Book/Receipt</th><th>Fee</th><th>Paid</th><th>Due</th><th>Action</th></tr>
                </thead>
                <tbody id="studentBody"></tbody>
            </table>
        </div>
    </div>

    <div id="referralList" class="tab-content" style="display:none;">
        <div class="table-container">
            <table>
                <thead><tr><th>Referrer Name</th><th>Count</th><th>Bonus (৳)</th></tr></thead>
                <tbody id="referralBody"></tbody>
            </table>
        </div>
    </div>

    <div id="courseList" class="tab-content" style="display:none;">
        <div class="section">
            <h3>Course Management</h3>
            <div class="grid-form">
                <input type="text" id="cName" placeholder="Course Name">
                <input type="number" id="cFee" placeholder="Default Fee">
                <button class="btn-submit" onclick="addCourse()">Add Course</button>
            </div>
        </div>
        <div class="table-container">
            <table>
                <thead><tr><th>Course</th><th>Fee</th><th>Action</th></tr></thead>
                <tbody id="courseBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="ledgerModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div id="ledgerContent"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = "YOUR_SCRIPT_URL_HERE"; 
    let students = [];
    let courses = JSON.parse(localStorage.getItem('LIT_CR_FINAL_X')) || [{name: "Web Design", fee: 5000}];

    function checkLogin() {
        if(document.getElementById('username').value === "admin" && document.getElementById('password').value === "1234") {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            fetchFromSheet();
        } else { document.getElementById('loginError').style.display = 'block'; }
    }
    function logout() { location.reload(); }

    async function fetchFromSheet() {
        try {
            const res = await fetch(SCRIPT_URL);
            students = await res.json();
            refresh();
        } catch (e) { console.log("Fetch Error"); }
    }

    async function postToSheet(data) {
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
    }

    function applySearch() {
        const q = document.getElementById('liveSearch').value.toLowerCase();
        const filtered = students.filter(s => 
            s.name.toLowerCase().includes(q) || s.mobile.includes(q) || s.id.toString().includes(q) || s.lastRec.toString().includes(q)
        );
        renderList(filtered);
        if(q !== "") { switchTab(null, 'studentList'); }
    }

    function switchTab(e, id) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        if(e) e.currentTarget.classList.add('active');
        else document.querySelector(`[onclick*="${id}"]`).classList.add('active');
    }

    function renderCourses() {
        const body = document.getElementById('courseBody');
        const sel = document.getElementById('courseSelect');
        body.innerHTML = "";
        sel.innerHTML = '<option value="">-- Select Course --</option>';
        courses.forEach((c, idx) => {
            body.innerHTML += `<tr><td>${c.name}</td><td>${c.fee}</td><td><button class="btn-danger" onclick="courses.splice(${idx},1); renderCourses();">Del</button></td></tr>`;
            sel.innerHTML += `<option value="${c.name}" data-fee="${c.fee}">${c.name}</option>`;
        });
        localStorage.setItem('LIT_CR_FINAL_X', JSON.stringify(courses));
    }

    function addCourse() {
        const n = document.getElementById('cName').value;
        const f = document.getElementById('cFee').value;
        if(n && f) { courses.push({name:n, fee:parseInt(f)}); renderCourses(); document.getElementById('cName').value=''; document.getElementById('cFee').value=''; }
    }

    function autoFee() {
        const s = document.getElementById('courseSelect');
        document.getElementById('totalFee').value = s.options[s.selectedIndex].getAttribute('data-fee') || "";
    }

    function saveStudent() {
        const rec = document.getElementById('receiptNo').value;
        const book = document.getElementById('bookNo').value;
        if(!rec || !book) return alert("Book and Receipt numbers are required!");

        const isDuplicate = students.some(s => s.lastRec == rec || s.history.some(h => h.receipt == rec));
        if(isDuplicate) return alert("This Receipt Number already exists!");

        const sid = Date.now().toString().slice(-6); 
        const pay = parseInt(document.getElementById('payAmt').value) || 0;
        
        const newSt = {
            id: sid, name: document.getElementById('stdName').value, mobile: document.getElementById('stdMobile').value,
            course: document.getElementById('courseSelect').value, total: parseInt(document.getElementById('totalFee').value),
            paid: pay, referrer: document.getElementById('referrer').value || "None",
            lastBook: book, lastRec: rec, receiver: document.getElementById('reciever').value,
            history: pay > 0 ? [{amt: pay, date: new Date().toLocaleString(), book: book, receipt: rec, by: document.getElementById('reciever').value}] : [],
            timestamp: new Date().toLocaleString()
        };
        
        students.push(newSt);
        postToSheet(newSt);
        refresh();
        alert("Saved! Student ID: " + sid);
        document.querySelectorAll('#admissionForm input').forEach(i => i.value = "");
    }

    function renderList(data) {
        const body = document.getElementById('studentBody');
        body.innerHTML = "";
        data.sort((a,b) => b.id - a.id).forEach(s => {
            const due = s.total - s.paid;
            body.innerHTML += `<tr>
                <td>${s.id}</td>
                <td><b class="clickable" onclick="openLedger('${s.id}')">${s.name}</b><br><small>${s.mobile}</small></td>
                <td>${s.course}</td>
                <td>B:${s.lastBook}/R:${s.lastRec}</td>
                <td>${s.total}</td>
                <td style="color:green">${s.paid}</td>
                <td style="color:${due > 0 ? 'red' : 'green'}"><b>${due}</b></td>
                <td>
                    ${due > 0 ? `<button class="btn-submit" onclick="addPay('${s.id}')">Pay</button>` : '<b style="color:green">Paid</b>'}
                </td>
            </tr>`;
        });
    }

    function addPay(id) {
        const s = students.find(x => x.id == id);
        const due = s.total - s.paid;
        const amt = prompt(`Current Due: ${due}\nEnter Amount:`);
        if(!amt || parseInt(amt) > due) return alert("Invalid Amount!");
        
        const book = prompt("Enter Book Number:");
        const rec = prompt("Enter Receipt Number:");
        const isDuplicate = students.some(st => st.lastRec == rec || st.history.some(h => h.receipt == rec));
        if(isDuplicate) return alert("This Receipt Number already exists!");

        const p = parseInt(amt);
        s.paid += p; s.lastBook = book; s.lastRec = rec;
        s.history.push({amt: p, date: new Date().toLocaleString(), book: book, receipt: rec, by: "Admin"});
        postToSheet(s);
        refresh();
    }

    function openLedger(id) {
        const s = students.find(x => x.id == id);
        let h = `<h3>Ledger: ${s.name} (ID: ${s.id})</h3><table border="1" style="width:100%; border-collapse:collapse;">
            <thead style="background:#eee"><tr><th>Date</th><th>Book No</th><th>Receipt No</th><th>Amount</th><th>Collector</th></tr></thead><tbody>`;
        s.history.forEach(i => h += `<tr><td>${i.date}</td><td>${i.book}</td><td>${i.receipt}</td><td>৳${i.amt}</td><td>${i.by}</td></tr>`);
        document.getElementById('ledgerContent').innerHTML = h + `</tbody></table><br><b>Total Paid: ৳${s.paid} | Balance Due: ৳${s.total-s.paid}</b>`;
        document.getElementById('ledgerModal').style.display = 'block';
    }

    function refresh() {
        const paid = students.reduce((a,b) => a + (parseInt(b.paid) || 0), 0);
        const total = students.reduce((a,b) => a + (parseInt(b.total) || 0), 0);
        document.getElementById('totalStudents').innerText = students.length;
        document.getElementById('totalCollection').innerText = "৳ " + paid;
        document.getElementById('totalDue').innerText = "৳ " + (total - paid);
        renderList(students);
        renderRefs();
    }

    function renderRefs() {
        const body = document.getElementById('referralBody');
        body.innerHTML = "";
        let rs = {};
        students.forEach(s => { if(s.referrer !== "None") {
            if(!rs[s.referrer]) rs[s.referrer] = 0;
            if(s.paid >= (s.total * 0.5)) rs[s.referrer] += 500;
        }});
        for(let r in rs) body.innerHTML += `<tr><td>${r}</td><td>${students.filter(x=>x.referrer===r).length}</td><td>৳ ${rs[r]}</td></tr>`;
    }

    function closeModal() { document.getElementById('ledgerModal').style.display = 'none'; }
    renderCourses();
</script>
</body>
</html>
