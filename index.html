<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIT BD - Secure Management System</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #34495e; --accent: #27ae60; --text: #2c3e50; --danger: #e74c3c; --info: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 1300px; margin: auto; }
        
        /* Login Overlay */
        #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--primary); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; width: 320px; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        
        .header { background: var(--primary); color: white; padding: 15px; text-align: center; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; padding: 10px 30px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 5px solid var(--accent); }
        .card h3 { margin: 0; color: #7f8c8d; font-size: 13px; text-transform: uppercase; }
        .card p { font-size: 22px; font-weight: bold; margin: 10px 0 0; color: var(--primary); }

        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; flex-wrap: wrap; }
        .search-box { flex-grow: 2; padding: 12px 20px; border: 2px solid var(--primary); border-radius: 25px; outline: none; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-btn { background: #ddd; padding: 10px 18px; cursor: pointer; border-radius: 5px; border: none; font-weight: 600; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        .section { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 5px; }

        .table-container { background: white; border-radius: 8px; overflow-x: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: var(--secondary); color: white; }
        .clickable { color: var(--info); cursor: pointer; font-weight: bold; text-decoration: underline; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { background: white; margin: 5% auto; padding: 25px; border-radius: 12px; width: 85%; max-width: 800px; position: relative; max-height: 85vh; overflow-y: auto; }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2>LIT BD Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button class="btn-submit" style="width:100%" onclick="checkLogin()">Login</button>
        <p id="loginError" style="color:red; display:none; margin-top:10px;">Invalid Credentials!</p>
    </div>
</div>

<div class="container" id="mainContent" style="display:none;">
    <div class="header">
        <h1>Management System</h1>
        <button onclick="logout()" style="background:var(--danger); color:white; padding:5px 15px;">Logout</button>
    </div>

    <div class="dashboard">
        <div class="card"><h3>Total Students</h3><p id="totalStudents">0</p></div>
        <div class="card"><h3>Collection</h3><p id="totalCollection">৳ 0</p></div>
        <div class="card" style="border-left-color: var(--danger)"><h3>Total Due</h3><p id="totalDue" style="color:var(--danger)">৳ 0</p></div>
        <div class="card"><h3>Ref. Bonus</h3><p id="totalReferral">৳ 0</p></div>
    </div>

    <div class="controls">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(event, 'admission')">Admission</button>
            <button class="tab-btn" onclick="switchTab(event, 'studentList')">Student List</button>
            <button class="tab-btn" onclick="switchTab(event, 'referralList')">Referrals</button>
        </div>
        <input type="text" id="liveSearch" class="search-box" placeholder="Search by Name, Phone or ID..." onkeyup="applySearch()">
    </div>

    <div id="admission" class="tab-content">
        <div class="section">
            <h3 id="formTitle">New Admission</h3>
            <input type="hidden" id="editId" value="">
            <div class="grid-form" id="admissionForm">
                <input type="text" id="stdName" placeholder="Full Name *">
                <input type="text" id="stdMobile" placeholder="Phone Number *">
                <select id="courseSelect" onchange="autoFee()">
                    <option value="">-- Select Course --</option>
                    <option value="Web Design" data-fee="5000">Web Design</option>
                    <option value="Web Development" data-fee="8000">Web Development</option>
                    <option value="Graphic Design" data-fee="4000">Graphic Design</option>
                </select>
                <input type="number" id="totalFee" placeholder="Total Fee *">
                <input type="text" id="referrer" placeholder="Referrer Name">
                <input type="text" id="receiptNo" placeholder="Receipt No *">
                <input type="number" id="payAmt" placeholder="Initial Pay (৳)">
                <input type="text" id="reciever" placeholder="Collected By">
                <button class="btn-submit" id="saveBtn" onclick="saveStudent()">Save Admission</button>
                <button id="cancelEdit" style="display:none;" onclick="clearForm()">Cancel</button>
            </div>
        </div>
    </div>

    <div id="studentList" class="tab-content" style="display:none;">
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>ID</th><th>Student Info</th><th>Course</th><th>Fee</th><th>Paid</th><th>Due</th><th>Action</th></tr>
                </thead>
                <tbody id="studentBody"></tbody>
            </table>
        </div>
    </div>

    <div id="referralList" class="tab-content" style="display:none;">
        <div class="table-container">
            <table>
                <thead><tr><th>Referrer Name</th><th>Students</th><th>Bonus (৳)</th></tr></thead>
                <tbody id="referralBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="ledgerModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div id="ledgerContent"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxc-oKzEF4TIGRIG2yW_zxEwtWUD_sbA62zcXhRt68Q3dXmkGRdkcDn1nPYnxrBkwnW/exec"; 
    let students = [];

    // Login Logic
    function checkLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if(u === "admin" && p === "1234") {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            fetchFromSheet();
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    }
    function logout() { location.reload(); }

    async function fetchFromSheet() {
        try {
            const res = await fetch(SCRIPT_URL);
            students = await res.json();
            refresh();
        } catch (e) { console.log(e); }
    }

    async function postToSheet(data) {
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
    }

    function applySearch() {
        const q = document.getElementById('liveSearch').value.toLowerCase();
        const filtered = students.filter(s => 
            s.name.toLowerCase().includes(q) || s.mobile.includes(q) || s.id.toLowerCase().includes(q)
        );
        renderList(filtered);
        if(q !== "") {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.getElementById('studentList').style.display = 'block';
        }
    }

    function saveStudent() {
        const sid = "LIT-" + Date.now().toString().slice(-4);
        const pay = parseInt(document.getElementById('payAmt').value) || 0;
        const newStudent = {
            id: sid,
            name: document.getElementById('stdName').value,
            mobile: document.getElementById('stdMobile').value,
            course: document.getElementById('courseSelect').value,
            total: parseInt(document.getElementById('totalFee').value),
            paid: pay,
            referrer: document.getElementById('referrer').value || "None",
            lastRec: document.getElementById('receiptNo').value,
            receiver: document.getElementById('reciever').value,
            history: [{amt: pay, date: new Date().toLocaleString(), receipt: document.getElementById('receiptNo').value, by: document.getElementById('reciever').value}],
            timestamp: Date.now()
        };
        students.push(newStudent);
        postToSheet(newStudent);
        refresh();
        clearForm();
        alert("Success!");
    }

    function renderList(data) {
        const body = document.getElementById('studentBody');
        body.innerHTML = "";
        data.forEach(s => {
            const due = s.total - s.paid;
            body.innerHTML += `<tr>
                <td>${s.id}</td>
                <td><b class="clickable" onclick="openLedger('${s.id}')">${s.name}</b><br>${s.mobile}</td>
                <td>${s.course}</td>
                <td>${s.total}</td>
                <td style="color:green">${s.paid}</td>
                <td style="color:red">${due}</td>
                <td><button onclick="addPay('${s.id}')">Pay</button></td>
            </tr>`;
        });
    }

    function renderRefs() {
        const body = document.getElementById('referralBody');
        body.innerHTML = "";
        let rs = {};
        students.forEach(s => {
            if(s.referrer !== "None") {
                if(!rs[s.referrer]) rs[s.referrer] = [];
                rs[s.referrer].push(s);
            }
        });
        for(let r in rs) {
            let bonus = rs[r].filter(s => s.paid >= (s.total*0.5)).length * 500;
            body.innerHTML += `<tr>
                <td><b class="clickable" onclick="showRefDetails('${r}')">${r}</b></td>
                <td>${rs[r].length}</td>
                <td>৳ ${bonus}</td>
            </tr>`;
        }
    }

    function showRefDetails(refName) {
        const refStudents = students.filter(s => s.referrer === refName);
        let html = `<h3>Students Referred by: ${refName}</h3><table>
            <thead><tr><th>Name</th><th>Course</th><th>Paid</th><th>Due</th></tr></thead><tbody>`;
        refStudents.forEach(s => {
            html += `<tr><td>${s.name}</td><td>${s.course}</td><td>${s.paid}</td><td>${s.total-s.paid}</td></tr>`;
        });
        html += `</tbody></table>`;
        document.getElementById('ledgerContent').innerHTML = html;
        document.getElementById('ledgerModal').style.display = 'block';
    }

    function openLedger(id) {
        const s = students.find(x => x.id === id);
        let html = `<h3>Ledger: ${s.name}</h3><table><thead><tr><th>Date</th><th>Amount</th><th>Rec</th></tr></thead><tbody>`;
        s.history.forEach(h => html += `<tr><td>${h.date}</td><td>৳${h.amt}</td><td>${h.receipt}</td></tr>`);
        html += `</tbody></table><br><b>Total Paid: ৳${s.paid} | Balance: ৳${s.total-s.paid}</b>`;
        document.getElementById('ledgerContent').innerHTML = html;
        document.getElementById('ledgerModal').style.display = 'block';
    }

    function addPay(id) {
        const s = students.find(x => x.id === id);
        const amt = prompt(`Due: ${s.total-s.paid}\nEnter Amount:`);
        if(!amt || parseInt(amt) > (s.total-s.paid)) return alert("Invalid!");
        const rec = prompt("Receipt No:");
        const p = parseInt(amt);
        s.paid += p;
        s.history.push({amt: p, date: new Date().toLocaleString(), receipt: rec, by: "Admin"});
        postToSheet(s);
        refresh();
    }

    function refresh() {
        const paid = students.reduce((a,b) => a + (parseInt(b.paid) || 0), 0);
        const total = students.reduce((a,b) => a + (parseInt(b.total) || 0), 0);
        document.getElementById('totalStudents').innerText = students.length;
        document.getElementById('totalCollection').innerText = "৳ " + paid;
        document.getElementById('totalDue').innerText = "৳ " + (total - paid);
        renderList(students);
        renderRefs();
    }

    function switchTab(e, id) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        if(e) e.currentTarget.classList.add('active');
    }

    function autoFee() {
        const s = document.getElementById('courseSelect');
        document.getElementById('totalFee').value = s.options[s.selectedIndex].getAttribute('data-fee') || "";
    }

    function clearForm() { document.querySelectorAll('input').forEach(i => i.value = ""); }
    function closeModal() { document.getElementById('ledgerModal').style.display = 'none'; }
</script>
</body>
</html>
