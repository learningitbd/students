<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIT BD - Classic Management Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');

        :root {
            --classic-navy: #1a2a6c;
            --classic-gold: #b89241;
            --soft-bg: #fdfdfd;
            --text-dark: #2d3436;
            --danger: #d63031;
            --success: #27ae60;
            --border: #e0e0e0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f4f7f9;
            margin: 0;
            color: var(--text-dark);
        }

        .container { max-width: 1400px; margin: auto; padding: 30px; }

        /* Elegant Header */
        .header {
            background: linear-gradient(135deg, var(--classic-navy) 0%, #000000 100%);
            color: white;
            padding: 30px 40px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin-bottom: 30px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            margin: 0;
            letter-spacing: 1px;
            font-size: 28px;
        }

        /* Dashboard Stat Cards */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 35px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            border-top: 5px solid var(--classic-gold);
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
            transition: transform 0.3s;
        }

        .stat-card:hover { transform: translateY(-5px); }

        .stat-card h3 {
            margin: 0;
            font-size: 13px;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 1px;
        }

        .stat-card p {
            font-size: 30px;
            font-weight: 700;
            margin: 10px 0 0;
            color: var(--classic-navy);
        }

        /* Navigation Tabs */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .tabs { display: flex; gap: 5px; }

        .tab-btn {
            padding: 12px 25px;
            cursor: pointer;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            color: var(--secondary);
            background: transparent;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--classic-navy);
            color: white;
        }

        /* Classic Input Fields */
        .search-container { position: relative; }
        .search-container input {
            width: 320px;
            padding: 12px 20px;
            border-radius: 50px;
            border: 1px solid var(--border);
            outline: none;
            font-size: 14px;
            transition: 0.3s;
        }
        .search-container input:focus { border-color: var(--classic-gold); width: 380px; }

        /* Forms Section */
        .section-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
        }

        .grid-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .input-group label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
            color: var(--classic-navy);
        }

        input, select {
            width: 100%;
            padding: 14px;
            border: 1px solid #e1e1e1;
            border-radius: 8px;
            background: #fafafa;
            font-size: 15px;
            box-sizing: border-box;
        }

        input:focus { background: #fff; border-color: var(--classic-gold); outline: none; }

        /* Premium Tables */
        .table-wrap {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.03);
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fb; padding: 18px; text-align: left; font-size: 13px; color: #666; border-bottom: 2px solid #f1f1f1; }
        td { padding: 18px; border-bottom: 1px solid #f9f9f9; font-size: 14px; }
        
        .badge-paid { background: #e8f8f0; color: var(--success); padding: 5px 12px; border-radius: 50px; font-weight: 700; font-size: 12px; }
        .btn-pay { background: var(--danger); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; }

        /* Elegant Modals */
        #loginOverlay { position: fixed; inset: 0; background: var(--classic-navy); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 50px; border-radius: 30px; width: 400px; text-align: center; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); z-index: 9000; }
        .modal-content { background: white; margin: 50px auto; padding: 40px; border-radius: 25px; width: 90%; max-width: 650px; }

        .clickable { color: var(--classic-navy); cursor: pointer; font-weight: 600; text-decoration: none; }
        .clickable:hover { color: var(--classic-gold); }

        @media print { .nav-bar, .header, .btn-pay, #admission, .login-card { display: none !important; } }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <h1 style="font-family: 'Playfair Display'; color: var(--classic-navy);">LIT BD</h1>
        <p style="color: #666; margin-bottom: 30px;">Classic Administration Portal</p>
        <input type="text" id="username" placeholder="Username" style="margin-bottom:15px">
        <input type="password" id="password" placeholder="Password" style="margin-bottom:25px">
        <button onclick="checkLogin()" style="width:100%; padding:15px; border-radius:10px; border:none; background: var(--classic-navy); color: white; font-weight: bold; cursor: pointer;">SIGN IN</button>
    </div>
</div>

<div class="container" id="mainContent" style="display:none;">
    <div class="header">
        <h1>LIT Management Pro</h1>
        <div>
            <button onclick="window.print()" style="background: rgba(255,255,255,0.1); color: white; border: 1px solid white; padding: 10px 20px; border-radius: 10px; cursor: pointer;">Print Ledger</button>
            <button onclick="logout()" style="margin-left:10px; background: var(--danger); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer;">Exit</button>
        </div>
    </div>

    <div class="dashboard">
        <div class="stat-card"><h3>Total Enrolled</h3><p id="totalStudents">0</p></div>
        <div class="stat-card"><h3>Revenue</h3><p id="totalCollection">৳ 0</p></div>
        <div class="stat-card" style="border-top-color: var(--danger)"><h3>Outstanding</h3><p id="totalDue">৳ 0</p></div>
        <div class="stat-card" style="border-top-color: #3498db"><h3>Affiliate Bonus</h3><p id="totalReferral">৳ 0</p></div>
    </div>

    <div class="nav-bar">
        <div class="tabs">
            <button class="tab-btn active" id="btnAdm" onclick="switchTab(event, 'admission')">New Admission</button>
            <button class="tab-btn" id="btnList" onclick="switchTab(event, 'studentList')">Student Registry</button>
            <button class="tab-btn" onclick="switchTab(event, 'referralList')">Referral Network</button>
            <button class="tab-btn" onclick="switchTab(event, 'courseList')">Curriculum</button>
        </div>
        <div class="search-container">
            <input type="text" id="liveSearch" placeholder="Filter by Name, ID, Mobile or Receipt..." oninput="applySearch()">
        </div>
    </div>

    <div id="admission" class="tab-content">
        <div class="section-card">
            <div class="grid-form" id="admissionForm">
                <div class="input-group"><label>Student Name *</label><input type="text" id="stdName"></div>
                <div class="input-group"><label>Primary Mobile *</label><input type="text" id="stdMobile"></div>
                <div class="input-group"><label>Selected Program *</label><select id="courseSelect" onchange="autoFee()"></select></div>
                <div class="input-group"><label>Agreed Fee *</label><input type="number" id="totalFee"></div>
                <div class="input-group"><label>Referrer (If any)</label><input type="text" id="referrer"></div>
                <div class="input-group"><label>Book Number *</label><input type="text" id="bookNo"></div>
                <div class="input-group"><label>Receipt Number *</label><input type="text" id="receiptNo"></div>
                <div class="input-group"><label>Initial Deposit</label><input type="number" id="payAmt" value="0"></div>
                <div class="input-group"><label>Accountant Name *</label><input type="text" id="reciever"></div>
                <div style="grid-column: span 1 / -1;"><button onclick="saveStudent()" style="width:100%; padding:18px; border-radius:12px; border:none; background: var(--classic-gold); color: white; font-weight: 800; cursor: pointer; font-size:16px;">REGISTER STUDENT</button></div>
            </div>
        </div>
    </div>

    <div id="studentList" class="tab-content" style="display:none;">
        <div class="table-wrap">
            <table>
                <thead><tr><th>ID</th><th>Candidate</th><th>Program</th><th>Registry Docs</th><th>Agreed</th><th>Paid</th><th>Due</th><th class="action-col">Manage</th></tr></thead>
                <tbody id="studentBody"></tbody>
            </table>
        </div>
    </div>

    <div id="referralList" class="tab-content" style="display:none;">
        <div class="table-wrap"><table><thead><tr><th>Partner Name</th><th>Volume</th><th>Incentive (৳)</th></tr></thead><tbody id="referralBody"></tbody></table></div>
    </div>

    <div id="courseList" class="tab-content" style="display:none;">
        <div class="section-card" style="margin-bottom:20px;">
            <div class="grid-form">
                <input type="hidden" id="cIdx" value="">
                <div class="input-group"><label>Course Title</label><input type="text" id="cName"></div>
                <div class="input-group"><label>Standard Fee</label><input type="number" id="cFee"></div>
                <button onclick="addCourse()" id="cBtn" style="background: var(--classic-navy); color:white; border-radius:10px; border:none; cursor:pointer;">Update Curriculum</button>
            </div>
        </div>
        <div class="table-wrap"><table id="courseTable"></table></div>
    </div>
</div>

<div id="ledgerModal" class="modal"><div class="modal-content"><span onclick="closeLedger()" style="float:right; cursor:pointer; font-size:24px;">&times;</span><div id="ledgerContent"></div></div></div>

<div id="payModal" class="modal">
    <div class="modal-content" style="max-width:450px;">
        <h2 style="font-family: 'Playfair Display'; border-bottom: 2px solid var(--classic-gold); padding-bottom:10px;">Payment Entry</h2>
        <input type="hidden" id="payId">
        <div class="input-group"><label>Amount (৳) *</label><input type="number" id="instAmt"></div>
        <div class="input-group"><label>Book Reference *</label><input type="text" id="instBook"></div>
        <div class="input-group"><label>Receipt Reference *</label><input type="text" id="instRec"></div>
        <div class="input-group"><label>Authorized By *</label><input type="text" id="instBy"></div>
        <div style="display:flex; gap:15px; margin-top:30px;">
            <button onclick="confirmPayment()" style="flex:2; padding:15px; border-radius:10px; border:none; background: var(--success); color:white; font-weight:700; cursor:pointer;">POST PAYMENT</button>
            <button onclick="closePayModal()" style="flex:1; padding:15px; border-radius:10px; border:none; background: #eee; cursor:pointer;">CANCEL</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwLcVRKzdMeTqkFrP9SVYQcJM-fs_krh3kCb25-0fPPz3Ser6ghUbHX3O0Y4-lmJOE/exec"; 
    let students = [];
    let courses = JSON.parse(localStorage.getItem('LIT_CR_X_PRO')) || [{name: "Web Design", fee: 5000}];

    function checkLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if(u === "admin" && p === "1234") {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            fetchFromSheet();
        } else alert("Invalid Access Credentials");
    }
    function logout() { location.reload(); }

    async function fetchFromSheet() {
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            students = data.map(s => { 
                s.historyList = parseHistory(s.history); 
                return s; 
            });
            refresh();
        } catch (e) { console.log("Database Connection Failed"); }
    }

    function parseHistory(text) {
        if(!text || typeof text !== 'string') return [];
        return text.split('\n').map(line => {
            let amt = line.match(/৳(\d+)/)?.[1] || 0;
            let date = line.match(/Date: ([^|]+)/)?.[1]?.trim() || "";
            let book = line.match(/Book: ([^|]+)/)?.[1]?.trim() || "";
            let rec = line.match(/Rec: ([^|]+)/)?.[1]?.trim() || "";
            let by = line.match(/By: ([^)]+)/)?.[1]?.trim() || "";
            return {amt, date, book, receipt: rec, by};
        });
    }

    async function postToSheet(data) {
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
    }

    function applySearch() {
        const q = document.getElementById('liveSearch').value.toLowerCase();
        const filtered = students.filter(s => 
            s.name.toLowerCase().includes(q) || 
            s.mobile.includes(q) || 
            s.id.toString().includes(q) ||
            s.lastRec.toString().includes(q)
        );
        renderList(filtered);
        if(q) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.getElementById('studentList').style.display = 'block';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btnList').classList.add('active');
        }
    }

    function saveStudent() {
        const req = ['stdName','stdMobile','courseSelect','totalFee','bookNo','receiptNo','reciever'];
        for(let f of req) if(!document.getElementById(f).value) return alert("All Required Fields Must Be Filled");
        
        const rec = document.getElementById('receiptNo').value;
        if(getAllReceipts().includes(rec)) return alert("Receipt Number Conflict Detected");

        const sid = Date.now().toString().slice(-6);
        const pay = parseInt(document.getElementById('payAmt').value) || 0;
        const newSt = {
            id: sid, name: document.getElementById('stdName').value, mobile: document.getElementById('stdMobile').value,
            course: document.getElementById('courseSelect').value, total: parseInt(document.getElementById('totalFee').value),
            paid: pay, referrer: document.getElementById('referrer').value || "None",
            lastBook: document.getElementById('bookNo').value, lastRec: rec, receiver: document.getElementById('reciever').value,
            historyList: pay > 0 ? [{amt: pay, date: new Date().toLocaleDateString(), book: document.getElementById('bookNo').value, receipt: rec, by: document.getElementById('reciever').value}] : [],
            timestamp: new Date().toLocaleString()
        };
        students.push(newSt); postToSheet(newSt); refresh();
        document.querySelectorAll('#admissionForm input').forEach(i => i.value = "");
        switchTab(null, 'studentList');
    }

    function getAllReceipts() {
        let rs = [];
        students.forEach(s => { rs.push(s.lastRec); s.historyList.forEach(h => rs.push(h.receipt)); });
        return rs;
    }

    function renderList(data) {
        const body = document.getElementById('studentBody'); body.innerHTML = "";
        data.sort((a,b) => b.id - a.id).forEach(s => {
            const due = s.total - s.paid;
            body.innerHTML += `<tr>
                <td><span style="background:#eee; padding:4px 8px; border-radius:5px; font-weight:bold">${s.id}</span></td>
                <td><b class="clickable" onclick="openLedger('${s.id}')">${s.name}</b><br><small style="color:#888">${s.mobile}</small></td>
                <td>${s.course}</td><td><small>B:${s.lastBook}</small><br><b>R:${s.lastRec}</b></td>
                <td>৳${s.total}</td><td>৳${s.paid}</td>
                <td style="color:${due>0?'var(--danger)':'var(--success)'}; font-weight:800">৳${due}</td>
                <td class="action-col">${due>0?`<button class="btn-pay" onclick="openPayModal('${s.id}')">PAYMENT</button>`:`<span class="badge-paid">COMPLETED</span>`}</td>
            </tr>`;
        });
    }

    function openPayModal(id) {
        const s = students.find(x => x.id == id);
        document.getElementById('payId').value = id;
        document.getElementById('instBook').value = s.lastBook;
        document.getElementById('instBy').value = s.receiver;
        document.getElementById('instRec').value = "";
        document.getElementById('instAmt').value = "";
        document.getElementById('payModal').style.display = 'block';
    }

    function confirmPayment() {
        const id = document.getElementById('payId').value;
        const amt = parseInt(document.getElementById('instAmt').value);
        const rec = document.getElementById('instRec').value;
        const book = document.getElementById('instBook').value;
        const by = document.getElementById('instBy').value;

        if(!amt || !rec || !book || !by) return alert("Valid Information Required");
        if(getAllReceipts().includes(rec)) return alert("Duplicate Receipt Reference");

        const s = students.find(x => x.id == id);
        s.paid += amt; s.lastRec = rec; s.lastBook = book; s.receiver = by;
        s.historyList.push({amt, date: new Date().toLocaleDateString(), book, receipt: rec, by});
        postToSheet(s); closePayModal(); refresh();
    }

    function openLedger(id) {
        const s = students.find(x => x.id == id);
        document.getElementById('ledgerContent').innerHTML = `
            <h2 style="font-family:'Playfair Display'">${s.name} - Statement</h2>
            <div style="background:#f9f9f9; padding:25px; border-radius:20px; line-height:2.2; border: 1px dashed var(--classic-gold);">
                ${s.history.replace(/\n/g, '<br>')}
            </div>
            <div style="margin-top:20px; text-align:right"><b>Current Balance Due: ৳${s.total-s.paid}</b></div>`;
        document.getElementById('ledgerModal').style.display = 'block';
    }

    function refresh() {
        document.getElementById('totalStudents').innerText = students.length;
        document.getElementById('totalCollection').innerText = "৳ " + students.reduce((a,b)=>a+(parseInt(b.paid)||0),0);
        document.getElementById('totalDue').innerText = "৳ " + students.reduce((a,b)=>a+(parseInt(b.total-b.paid)||0),0);
        
        let rs = {}, bonusTotal = 0;
        students.forEach(s => { if(s.referrer && s.referrer !== "None") { if(!rs[s.referrer]) rs[s.referrer] = []; rs[s.referrer].push(s); } });
        document.getElementById('referralBody').innerHTML = "";
        for(let r in rs) {
            let b = rs[r].filter(s => s.paid >= (s.total*0.5)).length * 500;
            bonusTotal += b;
            document.getElementById('referralBody').innerHTML += `<tr><td><b class="clickable" onclick="showRefDetails('${r}')">${r}</b></td><td>${rs[r].length} Candidates</td><td>৳${b}</td></tr>`;
        }
        document.getElementById('totalReferral').innerText = "৳ " + bonusTotal;
        renderList(students);
    }

    function showRefDetails(ref) {
        const list = students.filter(s => s.referrer === ref);
        let h = `<h3>Network: ${ref}</h3><table border="1" style="width:100%; border-collapse:collapse"><thead><tr style="background:#eee"><th>Name</th><th>Paid</th><th>Ledger</th></tr></thead><tbody>`;
        list.forEach(s => h += `<tr><td>${s.name}</td><td>${s.paid}</td><td><small>${s.history.replace(/\n/g, '<br>')}</small></td></tr>`);
        document.getElementById('ledgerContent').innerHTML = h + "</tbody></table>";
        document.getElementById('ledgerModal').style.display = 'block';
    }

    function switchTab(e, id) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        if(e) e.currentTarget.classList.add('active');
        else document.getElementById(id === 'studentList' ? 'btnList' : 'btnAdm').classList.add('active');
    }

    function renderCourses() {
        const sel = document.getElementById('courseSelect'); const tbl = document.getElementById('courseTable');
        sel.innerHTML = '<option value="">-- Programs --</option>'; 
        tbl.innerHTML = "<tr><th>Course Title</th><th>Registry Fee</th><th>Manage</th></tr>";
        courses.forEach((c, i) => { 
            sel.innerHTML += `<option value="${c.name}" data-fee="${c.fee}">${c.name}</option>`; 
            tbl.innerHTML += `<tr><td>${c.name}</td><td>৳${c.fee}</td><td><button class="btn" style="background:#f1f5f9" onclick="editCourse(${i})">Edit</button><button class="btn btn-danger" style="margin-left:5px; padding:5px 10px" onclick="delCourse(${i})">Del</button></td></tr>`; 
        });
        localStorage.setItem('LIT_CR_X_PRO', JSON.stringify(courses));
    }
    function addCourse() {
        const n = document.getElementById('cName').value; const f = document.getElementById('cFee').value; const idx = document.getElementById('cIdx').value;
        if(idx !== "") courses[idx] = {name: n, fee: f}; else courses.push({name: n, fee: f});
        document.getElementById('cIdx').value = ""; document.getElementById('cName').value = ""; document.getElementById('cFee').value = "";
        document.getElementById('cBtn').innerText = "Add Course"; renderCourses();
    }
    function editCourse(i) {
        document.getElementById('cName').value = courses[i].name; document.getElementById('cFee').value = courses[i].fee;
        document.getElementById('cIdx').value = i; document.getElementById('cBtn').innerText = "Update";
    }
    function delCourse(i) { if(confirm("Permanently Remove Program?")) { courses.splice(i,1); renderCourses(); } }
    function autoFee() { document.getElementById('totalFee').value = document.getElementById('courseSelect').options[document.getElementById('courseSelect').selectedIndex].getAttribute('data-fee') || ""; }
    function closePayModal() { document.getElementById('payModal').style.display = 'none'; }
    function closeLedger() { document.getElementById('ledgerModal').style.display = 'none'; }
    renderCourses();
</script>
</body>
</html>
