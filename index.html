<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIT BD - Management System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&display=swap');

        :root {
            --classic-navy: #1a2a6c;
            --classic-gold: #b89241;
            --bg-soft: #f8fafc;
            --danger: #e74c3c;
            --success: #27ae60;
            --info: #3498db;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg-soft); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1350px; margin: auto; }

        /* Premium Header */
        .header {
            background: linear-gradient(135deg, var(--classic-navy) 0%, #000000 100%);
            color: white; padding: 25px 35px; border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); margin-bottom: 25px;
        }
        .header h1 { font-family: 'Playfair Display', serif; margin: 0; font-size: 26px; letter-spacing: 1px; }

        /* Dashboard Cards */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: white; padding: 22px; border-radius: 15px;
            border-top: 4px solid var(--classic-gold); box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: 0.3s;
        }
        .stat-card h3 { margin: 0; font-size: 13px; color: #7f8c8d; text-transform: uppercase; }
        .stat-card p { font-size: 26px; font-weight: 700; margin: 8px 0 0; color: var(--classic-navy); }

        /* Navigation & Search */
        .controls {
            background: white; padding: 10px; border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); flex-wrap: wrap; gap: 10px;
        }
        .tabs { display: flex; gap: 5px; }
        .tab-btn {
            padding: 12px 22px; cursor: pointer; border-radius: 10px;
            border: none; font-weight: 600; background: transparent; transition: 0.3s;
        }
        .tab-btn.active { background: var(--classic-navy); color: white; }
        
        .search-box { position: relative; width: 320px; }
        .search-box input {
            width: 100%; padding: 12px 20px; border-radius: 50px;
            border: 1px solid #ddd; outline: none; transition: 0.3s;
        }
        .search-box input:focus { border-color: var(--classic-gold); box-shadow: 0 0 10px rgba(184, 146, 65, 0.1); }

        /* Forms & Tables */
        .section { background: white; padding: 35px; border-radius: 20px; box-shadow: 0 5px 25px rgba(0,0,0,0.03); }
        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        label { font-size: 13px; font-weight: 700; color: var(--classic-navy); display: block; margin-bottom: 8px; }
        input, select { padding: 14px; border: 1px solid #e2e8f0; border-radius: 10px; background: #fcfcfc; width: 100%; box-sizing: border-box; }
        input:focus { border-color: var(--classic-gold); background: #fff; outline: none; }

        .table-container { background: white; border-radius: 15px; overflow-x: auto; box-shadow: 0 5px 20px rgba(0,0,0,0.03); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 18px; text-align: left; font-size: 13px; color: #64748b; border-bottom: 2px solid #f1f5f9; }
        td { padding: 18px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        
        .btn-pay { background: var(--danger); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .clickable { color: var(--classic-navy); cursor: pointer; font-weight: bold; text-decoration: underline; }

        /* Modals */
        #loginOverlay { position: fixed; inset: 0; background: var(--classic-navy); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 45px; border-radius: 25px; width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); z-index: 9999; }
        .modal-content { background: white; margin: 50px auto; padding: 35px; border-radius: 20px; width: 90%; max-width: 600px; position: relative; }

        /* Due Display in Modal */
        .due-display {
            background: #fff5f5; color: var(--danger); padding: 15px; border-radius: 10px;
            text-align: center; font-weight: 800; font-size: 20px; border: 1px dashed var(--danger); margin-bottom: 20px;
        }

        @media print { .tabs, .header, .btn-pay, #admission, .search-box, .action-col { display: none !important; } }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <h1 style="font-family: 'Playfair Display'; color: var(--classic-navy);">LIT BD</h1>
        <p style="color: #666; margin-bottom: 25px;">Secure Administration Login</p>
        <input type="text" id="username" placeholder="Username" style="margin-bottom:15px">
        <input type="password" id="password" placeholder="Password" style="margin-bottom:25px">
        <button onclick="checkLogin()" style="width:100%; padding:15px; border:none; border-radius:10px; background: var(--classic-navy); color: white; font-weight: bold; cursor: pointer;">LOGIN</button>
    </div>
</div>

<div class="container" id="mainContent" style="display:none;">
    <div class="header">
        <h1>Management System</h1>
        <div>
            <button onclick="window.print()" style="background: rgba(255,255,255,0.1); color: white; border: 1px solid white; padding: 10px 20px; border-radius: 10px; cursor: pointer;">Print Report</button>
            <button onclick="logout()" style="margin-left:10px; background: var(--danger); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer;">Logout</button>
        </div>
    </div>

    <div class="dashboard">
        <div class="stat-card"><h3>Total Students</h3><p id="totalStudents">0</p></div>
        <div class="stat-card"><h3>Total Collection</h3><p id="totalCollection">৳ 0</p></div>
        <div class="stat-card" style="border-top-color: var(--danger)"><h3>Total Due</h3><p id="totalDue">৳ 0</p></div>
        <div class="stat-card" style="border-top-color: var(--info)"><h3>Referral Bonus</h3><p id="totalReferral">৳ 0</p></div>
    </div>

    <div class="controls">
        <div class="tabs">
            <button class="tab-btn active" id="btnAdm" onclick="switchTab(event, 'admission')">Admission</button>
            <button class="tab-btn" id="btnList" onclick="switchTab(event, 'studentList')">Student List</button>
            <button class="tab-btn" onclick="switchTab(event, 'referralList')">Referrals</button>
            <button class="tab-btn" onclick="switchTab(event, 'courseList')">Courses</button>
        </div>
        <div class="search-box">
            <input type="text" id="liveSearch" placeholder="Live Search ID, Name, Phone..." oninput="applySearch()">
        </div>
    </div>

    <div id="admission" class="tab-content">
        <div class="section">
            <h3 style="margin-top:0; color: var(--classic-navy); border-bottom: 2px solid var(--classic-gold); padding-bottom: 10px; width: fit-content;">Student Admission</h3>
            <div class="grid-form" id="admissionForm">
                <div><label>Full Name *</label><input type="text" id="stdName" required></div>
                <div><label>Phone Number *</label><input type="text" id="stdMobile" required></div>
                <div><label>Select Course *</label><select id="courseSelect" onchange="autoFee()" required></select></div>
                <div><label>Total Fee *</label><input type="number" id="totalFee" required></div>
                <div><label>Referrer Name</label><input type="text" id="referrer"></div>
                <div><label>Book Number *</label><input type="text" id="bookNo" required></div>
                <div><label>Receipt Number *</label><input type="text" id="receiptNo" required></div>
                <div><label>Initial Pay (৳)</label><input type="number" id="payAmt" value="0"></div>
                <div><label>Collected By *</label><input type="text" id="reciever" required></div>
                <div style="grid-column: span 1 / -1;"><button onclick="saveStudent()" style="width:100%; padding:18px; border-radius:12px; border:none; background: var(--classic-navy); color: white; font-weight: 700; cursor: pointer; font-size:16px; margin-top:10px;">CONFIRM ADMISSION</button></div>
            </div>
        </div>
    </div>

    <div id="studentList" class="tab-content" style="display:none;">
        <div class="table-container">
            <table>
                <thead><tr><th>ID</th><th>Student Details</th><th>Course</th><th>Book/Receipt</th><th>Total</th><th>Paid</th><th>Due</th><th class="action-col">Action</th></tr></thead>
                <tbody id="studentBody"></tbody>
            </table>
        </div>
    </div>

    <div id="referralList" class="tab-content" style="display:none;">
        <div class="table-container"><table><thead><tr><th>Referrer Name</th><th>Count</th><th>Bonus (৳)</th></tr></thead><tbody id="referralBody"></tbody></table></div>
    </div>

    <div id="courseList" class="tab-content" style="display:none;">
        <div class="section" style="margin-bottom:20px;">
            <div class="grid-form">
                <input type="hidden" id="cIdx" value="">
                <div><label>Course Name</label><input type="text" id="cName"></div>
                <div><label>Course Fee</label><input type="number" id="cFee"></div>
                <div style="display:flex; align-items:flex-end;"><button onclick="addCourse()" id="cBtn" style="background:var(--classic-navy); color:white; padding:14px 30px; border:none; border-radius:10px; cursor:pointer; width:100%;">Add/Update</button></div>
            </div>
        </div>
        <div class="table-container"><table id="courseTable"></table></div>
    </div>
</div>

<div id="ledgerModal" class="modal"><div class="modal-content"><span onclick="closeLedger()" style="float:right; cursor:pointer; font-size:24px;">&times;</span><div id="ledgerContent"></div></div></div>

<div id="payModal" class="modal">
    <div class="modal-content" style="max-width:400px;">
        <h3 style="border-bottom: 2px solid var(--classic-gold); padding-bottom:10px; margin-top:0;">Payment Entry</h3>
        
        <div class="due-display" id="modalDueShow">Current Due: ৳ 0</div>
        
        <input type="hidden" id="payId">
        <div style="margin-bottom:15px;"><label>Amount (৳) *</label><input type="number" id="instAmt"></div>
        <div style="margin-bottom:15px;"><label>Book Number *</label><input type="text" id="instBook"></div>
        <div style="margin-bottom:15px;"><label>Receipt Number *</label><input type="text" id="instRec"></div>
        <div style="margin-bottom:15px;"><label>Collected By *</label><input type="text" id="instBy"></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="confirmPayment()" style="flex:2; padding:15px; border-radius:10px; border:none; background: var(--success); color:white; font-weight:700; cursor:pointer;">SAVE</button>
            <button onclick="closePayModal()" style="flex:1; padding:15px; border-radius:10px; border:none; background: #eee; cursor:pointer;">CANCEL</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwLcVRKzdMeTqkFrP9SVYQcJM-fs_krh3kCb25-0fPPz3Ser6ghUbHX3O0Y4-lmJOE/exec"; 
    let students = [];
    let courses = JSON.parse(localStorage.getItem('LIT_CR_X_FINAL')) || [{name: "Web Design", fee: 5000}];

    function checkLogin() {
        if(document.getElementById('username').value === "admin" && document.getElementById('password').value === "1234") {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            fetchFromSheet();
        } else alert("Invalid Password!");
    }
    function logout() { location.reload(); }

    async function fetchFromSheet() {
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            students = data.map(s => { 
                s.historyList = parseHistory(s.history); 
                return s; 
            });
            refresh();
        } catch (e) { console.log("Network Error"); }
    }

    function parseHistory(text) {
        if(!text || typeof text !== 'string') return [];
        return text.split('\n').map(line => {
            let amt = line.match(/৳(\d+)/)?.[1] || 0;
            let date = line.match(/Date: ([^|]+)/)?.[1]?.trim() || "";
            let book = line.match(/Book: ([^|]+)/)?.[1]?.trim() || "";
            let rec = line.match(/Rec: ([^|]+)/)?.[1]?.trim() || "";
            let by = line.match(/By: ([^)]+)/)?.[1]?.trim() || "";
            return {amt, date, book, receipt: rec, by};
        });
    }

    async function postToSheet(data) {
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
    }

    function applySearch() {
        const q = document.getElementById('liveSearch').value.toLowerCase();
        const filtered = students.filter(s => 
            s.id.toString().includes(q) || 
            s.name.toLowerCase().includes(q) || 
            s.mobile.includes(q) ||
            s.lastRec.toString().includes(q)
        );
        renderList(filtered);
        
        if(q.length > 0) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.getElementById('studentList').style.display = 'block';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btnList').classList.add('active');
        }
    }

    function saveStudent() {
        const req = ['stdName','stdMobile','courseSelect','totalFee','bookNo','receiptNo','reciever'];
        for(let f of req) if(!document.getElementById(f).value) return alert("Fill all * fields!");
        
        const rec = document.getElementById('receiptNo').value;
        if(getAllReceipts().includes(rec)) return alert("Duplicate Receipt Number!");

        const sid = Date.now().toString().slice(-6);
        const pay = parseInt(document.getElementById('payAmt').value) || 0;
        const newSt = {
            id: sid, name: document.getElementById('stdName').value, mobile: document.getElementById('stdMobile').value,
            course: document.getElementById('courseSelect').value, total: parseInt(document.getElementById('totalFee').value),
            paid: pay, referrer: document.getElementById('referrer').value || "None",
            lastBook: document.getElementById('bookNo').value, lastRec: rec, receiver: document.getElementById('reciever').value,
            historyList: pay > 0 ? [{amt: pay, date: new Date().toLocaleDateString(), book: document.getElementById('bookNo').value, receipt: rec, by: document.getElementById('reciever').value}] : [],
            timestamp: new Date().toLocaleString()
        };
        students.push(newSt); postToSheet(newSt); refresh();
        document.querySelectorAll('#admissionForm input').forEach(i => i.value = "");
        switchTab(null, 'studentList');
    }

    function getAllReceipts() {
        let rs = [];
        students.forEach(s => { rs.push(s.lastRec); s.historyList.forEach(h => rs.push(h.receipt)); });
        return rs;
    }

    function renderList(data) {
        const body = document.getElementById('studentBody'); body.innerHTML = "";
        data.sort((a,b) => b.id - a.id).forEach(s => {
            const due = s.total - s.paid;
            body.innerHTML += `<tr>
                <td><b>${s.id}</b></td>
                <td><b class="clickable" onclick="openLedger('${s.id}')">${s.name}</b><br><small>${s.mobile}</small></td>
                <td>${s.course}</td><td>B:${s.lastBook}<br>R:${s.lastRec}</td>
                <td>৳${s.total}</td><td>৳${s.paid}</td>
                <td style="color:${due>0?'var(--danger)':'var(--success)'}; font-weight:800">৳${due}</td>
                <td class="action-col">${due>0?`<button class="btn-pay" onclick="openPayModal('${s.id}')">PAY</button>`:`<b style="color:var(--success)">PAID</b>`}</td>
            </tr>`;
        });
    }

    // পেমেন্ট মডাল ওপেন লজিক (Due Show আপডেট)
    function openPayModal(id) {
        const s = students.find(x => x.id == id);
        const due = s.total - s.paid;
        
        document.getElementById('payId').value = id;
        document.getElementById('modalDueShow').innerText = "Current Due: ৳ " + due; // এখানে Due দেখাচ্ছে
        document.getElementById('instBook').value = s.lastBook;
        document.getElementById('instBy').value = s.receiver;
        document.getElementById('instRec').value = "";
        document.getElementById('instAmt').value = "";
        document.getElementById('payModal').style.display = 'block';
    }

    function confirmPayment() {
        const id = document.getElementById('payId').value;
        const amt = parseInt(document.getElementById('instAmt').value);
        const rec = document.getElementById('instRec').value;
        const book = document.getElementById('instBook').value;
        const by = document.getElementById('instBy').value;

        if(!amt || !rec || !book || !by) return alert("Fill all fields");
        if(getAllReceipts().includes(rec)) return alert("Duplicate Receipt Reference");

        const s = students.find(x => x.id == id);
        if(amt > (s.total - s.paid)) return alert("Payment amount cannot exceed due amount!");

        s.paid += amt; s.lastRec = rec; s.lastBook = book; s.receiver = by;
        s.historyList.push({amt, date: new Date().toLocaleDateString(), book, receipt: rec, by});
        postToSheet(s); closePayModal(); refresh();
    }

    function openLedger(id) {
        const s = students.find(x => x.id == id);
        document.getElementById('ledgerContent').innerHTML = `
            <h2 style="font-family:'Playfair Display'; color:var(--classic-navy)">${s.name} - Statement</h2>
            <div style="background:#f8fafc; padding:25px; border-radius:15px; border-left: 5px solid var(--classic-gold); line-height:2.2;">
                ${s.history.replace(/\n/g, '<br>')}
            </div>
            <div style="margin-top:20px; text-align:right"><b>Due Balance: ৳${s.total-s.paid}</b></div>`;
        document.getElementById('ledgerModal').style.display = 'block';
    }

    function refresh() {
        document.getElementById('totalStudents').innerText = students.length;
        document.getElementById('totalCollection').innerText = "৳ " + students.reduce((a,b)=>a+(parseInt(b.paid)||0),0);
        document.getElementById('totalDue').innerText = "৳ " + students.reduce((a,b)=>a+(parseInt(b.total-b.paid)||0),0);
        
        let rs = {}, bonusTotal = 0;
        students.forEach(s => { if(s.referrer && s.referrer !== "None") { if(!rs[s.referrer]) rs[s.referrer] = []; rs[s.referrer].push(s); } });
        document.getElementById('referralBody').innerHTML = "";
        for(let r in rs) {
            let b = rs[r].filter(s => s.paid >= (s.total*0.5)).length * 500; bonusTotal += b;
            document.getElementById('referralBody').innerHTML += `<tr><td><b class="clickable" onclick="showRefDetails('${r}')">${r}</b></td><td>${rs[r].length} Students</td><td>৳${b}</td></tr>`;
        }
        document.getElementById('totalReferral').innerText = "৳ " + bonusTotal;
        renderList(students);
    }

    function showRefDetails(ref) {
        const list = students.filter(s => s.referrer === ref);
        let h = `<h3>Referred by: ${ref}</h3><table><thead><tr><th>Name</th><th>Course</th><th>Paid</th><th>Due</th></tr></thead><tbody>`;
        list.forEach(s => h += `<tr><td>${s.name}</td><td>${s.course}</td><td>${s.paid}</td><td>${s.total-s.paid}</td></tr>`);
        document.getElementById('ledgerContent').innerHTML = h + "</tbody></table>";
        document.getElementById('ledgerModal').style.display = 'block';
    }

    function switchTab(e, id) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        if(e) e.currentTarget.classList.add('active');
        else document.getElementById(id === 'studentList' ? 'btnList' : 'btnAdm').classList.add('active');
    }

    function renderCourses() {
        const sel = document.getElementById('courseSelect'); const tbl = document.getElementById('courseTable');
        sel.innerHTML = '<option value="">-- Select Course --</option>'; tbl.innerHTML = "<tr><th>Course</th><th>Fee</th><th>Manage</th></tr>";
        courses.forEach((c, i) => { 
            sel.innerHTML += `<option value="${c.name}" data-fee="${c.fee}">${c.name}</option>`; 
            tbl.innerHTML += `<tr><td>${c.name}</td><td>৳${c.fee}</td><td><button onclick="editCourse(${i})" style="padding:5px 10px; border-radius:5px; border:none; background:#eee; cursor:pointer">Edit</button><button onclick="delCourse(${i})" style="padding:5px 10px; border-radius:5px; border:none; background:var(--danger); color:white; margin-left:5px; cursor:pointer">Del</button></td></tr>`; 
        });
        localStorage.setItem('LIT_CR_X_FINAL', JSON.stringify(courses));
    }
    function addCourse() {
        const n = document.getElementById('cName').value; const f = document.getElementById('cFee').value; const idx = document.getElementById('cIdx').value;
        if(n && f) {
            if(idx !== "") courses[idx] = {name: n, fee: f}; else courses.push({name: n, fee: f});
            document.getElementById('cIdx').value = ""; document.getElementById('cName').value = ""; document.getElementById('cFee').value = "";
            document.getElementById('cBtn').innerText = "Add/Update"; renderCourses();
        }
    }
    function editCourse(i) {
        document.getElementById('cName').value = courses[i].name; document.getElementById('cFee').value = courses[i].fee;
        document.getElementById('cIdx').value = i; document.getElementById('cBtn').innerText = "Update";
    }
    function delCourse(i) { if(confirm("Delete Course?")) { courses.splice(i,1); renderCourses(); } }
    function autoFee() { document.getElementById('totalFee').value = document.getElementById('courseSelect').options[document.getElementById('courseSelect').selectedIndex].getAttribute('data-fee') || ""; }
    function closePayModal() { document.getElementById('payModal').style.display = 'none'; }
    function closeLedger() { document.getElementById('ledgerModal').style.display = 'none'; }
    renderCourses();
</script>
</body>
</html>
