<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning IT BD - Management System</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #34495e; --accent: #27ae60; --text: #2c3e50; --danger: #e74c3c; --info: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: auto; }
        
        /* UI Elements */
        .header { background: var(--primary); color: white; padding: 15px; text-align: center; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 8px; border-left: 5px solid var(--accent); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card h3 { margin: 0; font-size: 14px; color: #7f8c8d; }
        .card p { font-size: 24px; font-weight: bold; margin: 5px 0 0; }

        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-btn { background: #ddd; padding: 10px 18px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        .section { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; width: 100%; box-sizing: border-box; }
        input:focus { border-color: var(--info); outline: none; }
        
        .btn-pay { background: var(--danger); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-paid { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: var(--secondary); color: white; }
        .clickable { color: var(--info); cursor: pointer; text-decoration: underline; font-weight: bold; }

        /* Login */
        #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--primary); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 40px; border-radius: 10px; text-align: center; width: 350px; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { background: white; margin: 5% auto; padding: 25px; border-radius: 12px; width: 90%; max-width: 500px; position: relative; }
        
        @media print {
            .tabs, .controls, .header, .btn-pay, #admission, #courseList, #loginOverlay, .action-col { display: none !important; }
            .card { border: 1px solid #ddd; }
        }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2>LIT BD ADMIN</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="checkLogin()" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:5px; margin-top:10px; cursor:pointer;">Login</button>
    </div>
</div>

<div class="container" id="mainContent" style="display:none;">
    <div class="header">
        <h1>Learning IT BD</h1>
        <div>
            <button onclick="window.print()" style="background:var(--info); color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">Print Report</button>
            <button onclick="logout()" style="background:var(--danger); color:white; border:none; padding:8px 15px; border-radius:5px; margin-left:10px;">Logout</button>
        </div>
    </div>

    <div class="dashboard">
        <div class="card"><h3>Total Students</h3><p id="totalStudents">0</p></div>
        <div class="card"><h3>Collection</h3><p id="totalCollection">৳ 0</p></div>
        <div class="card" style="border-left-color: var(--danger)"><h3>Total Due</h3><p id="totalDue">৳ 0</p></div>
        <div class="card" style="border-left-color: var(--info)"><h3>Ref. Bonus</h3><p id="totalReferral">৳ 0</p></div>
    </div>

    <div class="controls">
        <div class="tabs">
            <button class="tab-btn active" id="t1" onclick="switchTab(event, 'admission')">Admission</button>
            <button class="tab-btn" id="t2" onclick="switchTab(event, 'studentList')">Student List</button>
            <button class="tab-btn" id="t3" onclick="switchTab(event, 'referralList')">Referrals</button>
            <button class="tab-btn" id="t4" onclick="switchTab(event, 'courseList')">Courses</button>
        </div>
        <input type="text" id="liveSearch" class="search-box" style="padding:12px; border-radius:25px; border:1px solid #ccc; width:300px;" placeholder="Search Name/Phone/ID..." onkeyup="applySearch()">
    </div>

    <div id="admission" class="tab-content">
        <div class="section">
            <h3>New Admission</h3>
            <div class="grid-form" id="admissionForm">
                <input type="text" id="stdName" placeholder="Full Name *">
                <input type="text" id="stdMobile" placeholder="Phone Number *">
                <select id="courseSelect" onchange="autoFee()"></select>
                <input type="number" id="totalFee" placeholder="Total Fee *">
                <input type="text" id="referrer" placeholder="Referrer Name">
                <input type="text" id="bookNo" placeholder="Book No *">
                <input type="text" id="receiptNo" placeholder="Receipt No *">
                <input type="number" id="payAmt" placeholder="Initial Pay (৳)">
                <input type="text" id="reciever" placeholder="Collected By *">
                <button onclick="saveStudent()" style="background:var(--accent); color:white; border:none; padding:12px; border-radius:5px; cursor:pointer; font-weight:bold;">Confirm Admission</button>
            </div>
        </div>
    </div>

    <div id="studentList" class="tab-content" style="display:none;">
        <div class="table-container">
            <table>
                <thead><tr><th>ID</th><th>Student Info</th><th>Course</th><th>Last Rec</th><th>Fee</th><th>Paid</th><th>Due</th><th class="action-col">Action</th></tr></thead>
                <tbody id="studentBody"></tbody>
            </table>
        </div>
    </div>

    <div id="referralList" class="tab-content" style="display:none;">
        <div class="table-container"><table><thead><tr><th>Referrer</th><th>Count</th><th>Bonus</th></tr></thead><tbody id="referralBody"></tbody></table></div>
    </div>

    <div id="courseList" class="tab-content" style="display:none;">
        <div class="section"><div class="grid-form"><input type="text" id="cName" placeholder="Course Name"><input type="number" id="cFee" placeholder="Fee"><button onclick="addCourse()" style="background:var(--primary); color:white; border:none; border-radius:5px;">Add</button></div></div>
        <table id="courseTable"></table>
    </div>
</div>

<div id="payModal" class="modal">
    <div class="modal-content">
        <h3>Installment Payment</h3>
        <input type="hidden" id="payTargetId">
        <label>Amount (৳) *</label><input type="number" id="instAmt" placeholder="Amount">
        <label>Book No *</label><input type="text" id="instBook">
        <label>Receipt No *</label><input type="text" id="instRec">
        <label>Collected By *</label><input type="text" id="instBy">
        <div style="margin-top:15px; display:flex; gap:10px;">
            <button onclick="confirmInstallment()" style="background:var(--accent); color:white; flex:1; padding:10px; border-radius:5px;">Save Payment</button>
            <button onclick="closePayModal()" style="background:#ccc; flex:1; padding:10px; border-radius:5px;">Cancel</button>
        </div>
    </div>
</div>

<div id="ledgerModal" class="modal">
    <div class="modal-content" style="max-width:800px;">
        <span onclick="closeLedger()" style="float:right; cursor:pointer; font-size:24px;">&times;</span>
        <div id="ledgerContent"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzUyNnlS9De42yt88azKjAwOYhlY6X38bxmsFxIgiNSAufz0sMUqrdy2AjuXzYbagpw/exec"; 
    let students = [];
    let courses = JSON.parse(localStorage.getItem('LIT_CR_X')) || [{name: "Web Design", fee: 5000}];

    function checkLogin() {
        if(document.getElementById('username').value === "admin" && document.getElementById('password').value === "1234") {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            fetchFromSheet();
        } else { alert("Access Denied!"); }
    }
    function logout() { location.reload(); }

    async function fetchFromSheet() {
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            students = data.map(s => {
                s.historyList = parseHistory(s.history);
                return s;
            });
            refresh();
        } catch (e) { console.log(e); }
    }

    function parseHistory(text) {
        if(!text || typeof text !== 'string') return [];
        return text.split('\n').map(line => {
            let amt = line.match(/৳(\d+)/)?.[1] || 0;
            let date = line.match(/Date: ([^|]+)/)?.[1]?.trim() || "";
            let rec = line.match(/Rec: ([^|]+)/)?.[1]?.trim() || "";
            let by = line.match(/By: ([^)]+)/)?.[1]?.trim() || "";
            return {amt, date, receipt: rec, by};
        });
    }

    async function postToSheet(data) {
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
    }

    function saveStudent() {
        const fields = {
            name: 'stdName', mobile: 'stdMobile', course: 'courseSelect', 
            fee: 'totalFee', book: 'bookNo', rec: 'receiptNo', by: 'reciever'
        };
        for(let key in fields) {
            if(!document.getElementById(fields[key]).value) return alert("Please fill up all * marked fields!");
        }

        const currentRec = document.getElementById('receiptNo').value;
        if(students.some(s => s.lastRec == currentRec || s.historyList.some(h => h.receipt == currentRec))) {
            return alert("Error: Duplicate Receipt Number!");
        }

        const sid = Date.now().toString().slice(-6);
        const pay = parseInt(document.getElementById('payAmt').value) || 0;
        const newSt = {
            id: sid, name: document.getElementById('stdName').value, mobile: document.getElementById('stdMobile').value,
            course: document.getElementById('courseSelect').value, total: parseInt(document.getElementById('totalFee').value),
            paid: pay, referrer: document.getElementById('referrer').value || "None",
            lastBook: document.getElementById('bookNo').value, lastRec: currentRec,
            receiver: document.getElementById('reciever').value,
            historyList: pay > 0 ? [{amt: pay, date: new Date().toLocaleDateString(), receipt: currentRec, by: document.getElementById('reciever').value}] : [],
            timestamp: new Date().toLocaleString()
        };
        
        students.push(newSt);
        postToSheet(newSt);
        refresh();
        alert("Admission Successful! ID: " + sid);
        document.querySelectorAll('#admissionForm input').forEach(i => i.value = "");
        switchTab(null, 'studentList');
    }

    function openPayModal(id) {
        const s = students.find(x => x.id == id);
        document.getElementById('payTargetId').value = id;
        document.getElementById('instBook').value = s.lastBook;
        document.getElementById('instBy').value = s.receiver;
        document.getElementById('instRec').value = "";
        document.getElementById('instAmt').value = "";
        document.getElementById('payModal').style.display = 'block';
    }

    function confirmInstallment() {
        const id = document.getElementById('payTargetId').value;
        const amt = parseInt(document.getElementById('instAmt').value);
        const rec = document.getElementById('instRec').value;
        const book = document.getElementById('instBook').value;
        const by = document.getElementById('instBy').value;

        if(!amt || !rec || !book || !by) return alert("Fill all fields!");
        
        const s = students.find(x => x.id == id);
        if(amt > (s.total - s.paid)) return alert("Amount exceeds due!");
        if(students.some(st => st.lastRec == rec || st.historyList.some(h => h.receipt == rec))) return alert("Duplicate Receipt!");

        s.paid += amt; s.lastRec = rec; s.lastBook = book; s.receiver = by;
        s.historyList.push({amt, date: new Date().toLocaleDateString(), receipt: rec, by});
        
        postToSheet(s);
        closePayModal();
        refresh();
    }

    function renderList(data) {
        const body = document.getElementById('studentBody');
        body.innerHTML = "";
        data.sort((a,b) => b.id - a.id).forEach(s => {
            const due = s.total - s.paid;
            body.innerHTML += `<tr>
                <td>${s.id}</td>
                <td><b class="clickable" onclick="openLedger('${s.id}')">${s.name}</b><br>${s.mobile}</td>
                <td>${s.course}</td>
                <td>B:${s.lastBook}/R:${s.lastRec}</td>
                <td>${s.total}</td>
                <td>${s.paid}</td>
                <td style="color:${due>0?'red':'green'}">${due}</td>
                <td class="action-col">${due>0?`<button class="btn-pay" onclick="openPayModal('${s.id}')">Pay</button>`:`<button class="btn-paid">Paid</button>`}</td>
            </tr>`;
        });
    }

    function openLedger(id) {
        const s = students.find(x => x.id == id);
        let hContent = `<h3>Ledger: ${s.name}</h3><div style="line-height:1.8; background:#f9f9f9; padding:15px; border-radius:8px;">`;
        s.historyList.forEach(h => {
            hContent += `৳${h.amt} (Date: ${h.date} | Rec: ${h.receipt} | By: ${h.by})<br>`;
        });
        document.getElementById('ledgerContent').innerHTML = hContent + `</div><br><b>Due: ৳${s.total-s.paid}</b>`;
        document.getElementById('ledgerModal').style.display = 'block';
    }

    function refresh() {
        document.getElementById('totalStudents').innerText = students.length;
        document.getElementById('totalCollection').innerText = "৳ " + students.reduce((a,b)=>a+(parseInt(b.paid)||0),0);
        document.getElementById('totalDue').innerText = "৳ " + students.reduce((a,b)=>a+(parseInt(b.total-b.paid)||0),0);
        renderList(students);
        renderRefs();
    }

    function renderRefs() {
        const body = document.getElementById('referralBody');
        body.innerHTML = "";
        let rs = {}, bonusTotal = 0;
        students.forEach(s => {
            if(s.referrer !== "None") {
                if(!rs[s.referrer]) rs[s.referrer] = [];
                rs[s.referrer].push(s);
            }
        });
        for(let r in rs) {
            let b = rs[r].filter(s => s.paid >= (s.total*0.5)).length * 500;
            bonusTotal += b;
            body.innerHTML += `<tr><td><b class="clickable" onclick="showRefDetails('${r}')">${r}</b></td><td>${rs[r].length}</td><td>৳${b}</td></tr>`;
        }
        document.getElementById('totalReferral').innerText = "৳ " + bonusTotal;
    }

    function showRefDetails(ref) {
        const list = students.filter(s => s.referrer === ref);
        let h = `<h3>Ref: ${ref}</h3><table><thead><tr><th>Name</th><th>Paid</th><th>Status</th></tr></thead><tbody>`;
        list.forEach(s => h += `<tr><td>${s.name}</td><td>${s.paid}</td><td>${s.paid>=(s.total*0.5)?'Eligible':'Pending'}</td></tr>`);
        document.getElementById('ledgerContent').innerHTML = h + "</tbody></table>";
        document.getElementById('ledgerModal').style.display = 'block';
    }

    function switchTab(e, id) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        if(e) e.currentTarget.classList.add('active');
        else { document.getElementById('t2').classList.add('active'); document.getElementById('t1').classList.remove('active'); }
    }

    function applySearch() {
        const q = document.getElementById('liveSearch').value.toLowerCase();
        renderList(students.filter(s => s.name.toLowerCase().includes(q) || s.mobile.includes(q) || s.id.includes(q)));
        if(q) switchTab(null, 'studentList');
    }

    function renderCourses() {
        const sel = document.getElementById('courseSelect');
        const tbl = document.getElementById('courseTable');
        sel.innerHTML = '<option value="">-- Course --</option>';
        tbl.innerHTML = "<tr><th>Course</th><th>Fee</th><th>Action</th></tr>";
        courses.forEach((c, i) => {
            sel.innerHTML += `<option value="${c.name}" data-fee="${c.fee}">${c.name}</option>`;
            tbl.innerHTML += `<tr><td>${c.name}</td><td>${c.fee}</td><td><button onclick="courses.splice(${i},1);renderCourses()">Del</button></td></tr>`;
        });
        localStorage.setItem('LIT_CR_X', JSON.stringify(courses));
    }
    function addCourse() { courses.push({name: document.getElementById('cName').value, fee: document.getElementById('cFee').value}); renderCourses(); }
    function autoFee() { const s = document.getElementById('courseSelect'); document.getElementById('totalFee').value = s.options[s.selectedIndex].getAttribute('data-fee') || ""; }
    function closePayModal() { document.getElementById('payModal').style.display = 'none'; }
    function closeLedger() { document.getElementById('ledgerModal').style.display = 'none'; }
    renderCourses();
</script>
</body>
</html>
